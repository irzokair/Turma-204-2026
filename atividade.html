<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atividade de Revisão — Fundamentos de HTML</title>
<style>
  body {
    background: linear-gradient(180deg, #071029 0%, #0f1b2a 100%);
    color: #e6eef6;
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  }
  h1 {
    text-align: center;
    color: #00b8b8;
  }
  .question {
    background: rgba(255, 255, 255, 0.05);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .q-title {
    font-weight: bold;
  }
  .options label {
    display: block;
    padding: 5px;
    cursor: pointer;
  }
  .controls {
    margin-top: 20px;
    text-align: center;
  }
  button {
    background: #00b8b8;
    color: #042024;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin: 5px;
  }
  .secondary {
    background: transparent;
    color: #e6eef6;
    border: 1px solid #00b8b8;
  }
  .result, .answer-key {
    margin-top: 15px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Atividade de Revisão — Fundamentos de HTML</h1>
  <div class="card">
    <p><strong>Instruções:</strong> Leia atentamente cada enunciado e marque apenas uma alternativa.</p>
    <form id="quiz"></form>
    <div class="controls">
      <button id="check">Verificar respostas</button>
      <button type="button" id="showKey" class="secondary">Mostrar gabarito</button>
      <button type="button" id="reset" class="secondary">Limpar respostas</button>
    </div>
    <div id="result" class="result" style="display:none;"></div>
    <div id="answerKey" class="answer-key" style="display:none;"></div>
  </div>
</div>

<script>
const questions = [
  { q: "Durante a criação de uma página institucional, o navegador exibia apenas o texto 'Escola Futuro' na aba. Qual estrutura básica do HTML pode estar ausente?",
    choices: ["<body>", "<html>", "<title>", "<head>", "<meta>"], correct: 0 },
  { q: "Um desenvolvedor quer adicionar uma imagem com texto alternativo para acessibilidade. Qual atributo deve usar na tag IMG?",
    choices: ["src", "alt", "href", "title", "desc"], correct: 1 },
  { q: "Em HTML, a hierarquia de títulos vai de:", 
    choices: ["<h1> a <h3>", "<h1> a <h5>", "<h1> a <h6>", "<h1> a <h4>", "<h1> a <h2>"], correct: 2 },
  { q: "O fechamento incorreto das tags HTML pode causar:", 
    choices: ["Carregamento mais rápido", "Erro no servidor", "Exibição incorreta dos elementos", "Texto centralizado", "Imagem duplicada"], correct: 2 },
  { q: "As tags que representam listas ordenadas e não ordenadas são:", 
    choices: ["<ol> e <ul>", "<li> e <table>", "<menu> e <list>", "<ul> e <li>", "<ol> e <td>"], correct: 3 },
  { q: "O código <a href='https://www.museu.com'>Visite o museu</a> cria:", 
    choices: ["Um campo de formulário", "Um link para outra página", "Um título", "Uma tabela", "Um botão"], correct: 1 },
  { q: "O idioma da página é definido:", 
    choices: ["Na tag META", "No atributo lang da tag HTML", "Na tag BODY", "No rodapé", "No atributo charset"], correct: 1 },
  { q: "A tag mais adequada para o principal título da página é:", 
    choices: ["<title>", "<p>", "<h1>", "<h2>", "<header>"], correct: 2 },
  { q: "Usar duas tags <p> em sequência gera:", 
    choices: ["Um parágrafo contínuo", "Dois parágrafos separados", "Erro de sintaxe", "Texto centralizado", "Título de seção"], correct: 1 },
  { q: "A ausência de <!DOCTYPE html> pode causar:", 
    choices: ["Erro no servidor", "Perda do CSS", "Falhas na interpretação do HTML", "Imagem distorcida", "Falta de link"], correct: 2 },
  { q: "Para ajustar o tamanho de uma imagem, use:", 
    choices: ["width e height", "size e dimension", "length e scale", "pixels e ratio", "measure e proportion"], correct: 0 },
  { q: "Para tornar uma imagem clicável, usamos:", 
    choices: ["<a><img></a>", "<img><a></img>", "<link><img></link>", "<button><img></button>", "<div><img></div>"], correct: 0 },
  { q: "Os campos de um formulário não aparecem quando:", 
    choices: ["A tag FORM está ausente", "As tags FORM e INPUT estão incorretas", "O navegador não suporta HTML", "O arquivo está em .css", "O servidor caiu"], correct: 1 },
  { q: "A meta tag para responsividade correta é:", 
    choices: ["<meta name='viewport' content='width=device-width, initial-scale=1.0'>", "<meta charset='UTF-8'>", "<meta refresh>", "<meta name='device'>", "<meta mobile>"], correct: 0 },
  { q: "O código <html><head><title>Minha Página</title></head><body><p>Olá</p></body></html> representa:", 
    choices: ["Um script JS", "A estrutura básica do HTML", "Um CSS interno", "Um formulário", "Erro de tag"], correct: 1 },
  { q: "Para comentar no HTML, usamos:", 
    choices: ["//", "#", "/* */", "<!-- -->", "( )"], correct: 3 },
  { q: "A tag usada para agrupar elementos e aplicar estilos é:", 
    choices: ["<div>", "<p>", "<link>", "<head>", "<section>"], correct: 0 },
  { q: "A tag mais adequada para destacar texto sem mudar o sentido é:", 
    choices: ["<b>", "<i>", "<u>", "<strong>", "<mark>"], correct: 3 },
  { q: "A tag <br> serve para:", 
    choices: ["Quebrar a linha", "Criar parágrafo", "Adicionar borda", "Centralizar texto", "Mudar cor"], correct: 0 },
  { q: "O código <img src='foto.png'></img> tem erro porque:", 
    choices: ["Falta href", "O fechamento </img> é desnecessário", "Falta head", "Ordem errada", "Falta title"], correct: 1 }
];

function escapeHTML(str) {
  return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

const quiz = document.getElementById("quiz");
questions.forEach((item, i) => {
  const div = document.createElement("div");
  div.className = "question";
  div.innerHTML = `<div class='q-title'>Questão ${i + 1}</div>
  <div>${escapeHTML(item.q)}</div>
  <div class='options'>
  ${item.choices.map((c, j) => 
    `<label><input type='radio' name='q${i}' value='${j}'> ${String.fromCharCode(65+j)}. ${escapeHTML(c)}</label>`).join("")}
  </div>`;
  quiz.appendChild(div);
});

document.getElementById("check").onclick = e => {
  e.preventDefault();
  let score = 0;
  questions.forEach((q,i)=>{
    const sel = document.querySelector(`input[name='q${i}']:checked`);
    if(sel && Number(sel.value) === q.correct) score++;
  });
  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerHTML = `<strong>Acertos:</strong> ${score} de ${questions.length} (${Math.round(score/questions.length*100)}%)`;
};

document.getElementById("showKey").onclick = () => {
  const key = questions.map((q,i)=>`${i+1}: ${String.fromCharCode(65+q.correct)}`).join(" | ");
  const keyDiv = document.getElementById("answerKey");
  keyDiv.style.display = "block";
  keyDiv.textContent = "Gabarito — " + key;
};

document.getElementById("reset").onclick = () => {
  document.querySelectorAll("input[type=radio]").forEach(r=>r.checked=false);
  document.getElementById("result").style.display="none";
  document.getElementById("answerKey").style.display="none";
};
</script>
</body>
</html>
